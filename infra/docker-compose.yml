# PPTagent MVP — Local Infrastructure
# Per quickstart.md §1: PostgreSQL 16 + pgvector, Redis 7, MinIO, jaeger

version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pptagent-postgres
    environment:
      POSTGRES_USER: pptagent
      POSTGRES_PASSWORD: pptagent
      POSTGRES_DB: pptagent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pptagent -d pptagent"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: pptagent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: pptagent-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: pptagent-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/ppt-cold || true;
      mc mb -p local/ppt-hot || true;
      mc anonymous set download local/ppt-hot || true;
      echo 'MinIO buckets initialized';
      "

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: pptagent-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: pptagent-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./grafana/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    depends_on:
      - jaeger

  grafana:
    image: grafana/grafana:11.1.0
    container_name: pptagent-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/sla-dashboard.json:/var/lib/grafana/dashboards/sla-dashboard.json:ro
      - ./grafana/material-usage.json:/var/lib/grafana/dashboards/material-usage.json:ro
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  minio_data:
  grafana_data:
