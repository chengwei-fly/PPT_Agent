openapi: 3.1.0
info:
  title: PPTagent MVP API
  version: 0.1.0-mvp
  description: |
    REST API for PPTagent MVP 业务闭环（生成 / 知识库 / Agent 进化）。
    与 WebSocket 事件契约（events.yaml）配合使用，错误码遵循 RFC 7807。
servers:
  - url: http://localhost:8000/api/v1
    description: Local dev
  - url: https://api.pptagent.example.com/api/v1
    description: Production (placeholder)

security:
  - ApiKeyAuth: []

paths:
  # ─── Generations ───
  /generations:
    post:
      summary: 一句话生成 PPT
      operationId: createGeneration
      tags: [Generations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGenerationRequest'
      responses:
        '202':
          description: 已入队（含 queue_position）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationTask'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /generations/{task_id}:
    parameters:
      - in: path
        name: task_id
        required: true
        schema: { type: string, format: uuid }
    get:
      summary: 查询任务状态
      operationId: getGeneration
      tags: [Generations]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationTask'
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      summary: 取消任务（FR-003）
      operationId: cancelGeneration
      tags: [Generations]
      responses:
        '204': { description: 已停止 }
        '409': { $ref: '#/components/responses/Conflict' }

  /generations/{task_id}/trace:
    parameters:
      - in: path
        name: task_id
        required: true
        schema: { type: string, format: uuid }
    get:
      summary: 获取生成轨迹（FR-015）
      operationId: getTrace
      tags: [Generations]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/TraceStage' }
        '404': { $ref: '#/components/responses/NotFound' }

  /generations/{task_id}/stages/{stage_name}/redo:
    parameters:
      - in: path
        name: task_id
        required: true
        schema: { type: string, format: uuid }
      - in: path
        name: stage_name
        required: true
        schema: { type: string, enum: [outline, points, svg, pptx] }
    post:
      summary: 重做指定阶段（FR-016）
      operationId: redoStage
      tags: [Generations]
      responses:
        '202': { description: 已入队 }
        '409': { $ref: '#/components/responses/Conflict' }

  # ─── Samples ───
  /samples:
    get:
      summary: 列出当前用户的样本
      operationId: listSamples
      tags: [Samples]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Sample' }
    delete:
      summary: 一键删除当前用户所有样本（FR-019 部分）
      operationId: deleteAllSamples
      tags: [Samples]
      responses:
        '204': { description: 已入队 }
  /samples/batch:
    post:
      summary: 批量上传样本（FR-006）
      operationId: batchUploadSamples
      tags: [Samples]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items: { type: string, format: binary }
                  maxItems: 20
      responses:
        '202':
          description: 已入队解析
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Sample' }
        '413': { $ref: '#/components/responses/PayloadTooLarge' }

  /samples/{sample_id}:
    parameters:
      - in: path
        name: sample_id
        required: true
        schema: { type: string, format: uuid }
    get:
      summary: 样本详情（含 PII 摘要 + 解析结果）
      operationId: getSample
      tags: [Samples]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SampleDetail' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      summary: 删除单一样本（FR-007）
      operationId: deleteSample
      tags: [Samples]
      responses:
        '204': { description: OK }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      summary: 强制重新解析（FR-007 失败重试）
      operationId: reparseSample
      tags: [Samples]
      responses:
        '202': { description: 已入队 }
        '409': { $ref: '#/components/responses/Conflict' }

  # ─── US6: 素材库 (Material Library) ───
  /materials:
    get:
      summary: 素材库检索（FR-031：BM25 + 嵌入向量双路召回）
      description: |
        `query` 可选；不传则按筛选条件返回最近被复用的素材。
        `visual_types` / `industry_tags` / `source_sample_ids` 三个筛选维度可任意组合。
        结果按"BM25 × 0.4 + 视觉类型 × 0.2 + 嵌入余弦 × 0.4"加权相关度排序。
      operationId: searchMaterials
      tags: [Materials]
      parameters:
        - in: query
          name: query
          schema: { type: string, maxLength: 200 }
        - in: query
          name: visual_type
          schema:
            type: string
            enum: [cover, toc, architecture, flowchart, data, body, closing, mixed]
        - in: query
          name: industry
          schema: { type: string, description: '行业标签，可重复' }
        - in: query
          name: source_sample_id
          schema: { type: string, format: uuid }
        - in: query
          name: include_orphan
          schema: { type: boolean, default: false }
        - in: query
          name: page
          schema: { type: integer, default: 1, minimum: 1 }
        - in: query
          name: page_size
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MaterialSearchResult' }

  /materials/{asset_id}:
    parameters:
      - in: path
        name: asset_id
        required: true
        schema: { type: string, format: uuid }
    get:
      summary: 素材详情（含 SVG 原文 / 结构 / 风格指纹）
      operationId: getMaterial
      tags: [Materials]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SlideAssetDetail' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      summary: 删除素材（FR-037 不级联 sample）
      operationId: deleteMaterial
      tags: [Materials]
      responses:
        '204': { description: OK }
        '409':
          description: 素材正被某草稿引用
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /materials/{asset_id}/insert:
    parameters:
      - in: path
        name: asset_id
        required: true
        schema: { type: string, format: uuid }
    post:
      summary: 将素材插入指定草稿（FR-033 / FR-034 风格归一开关）
      operationId: insertMaterialIntoDraft
      tags: [Materials]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InsertMaterialRequest' }
      responses:
        '201':
          description: 插入成功
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DraftSlide' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '423':
          description: 草稿被其他用户锁定（FR-035 单写者）
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  # ─── US6: 草稿 (Drafts) ───
  /drafts:
    get:
      summary: 列出当前用户的活跃草稿
      operationId: listDrafts
      tags: [Drafts]
      parameters:
        - in: query
          name: status
          schema: { type: string, enum: [active, archived, exported] }
        - in: query
          name: page
          schema: { type: integer, default: 1, minimum: 1 }
        - in: query
          name: page_size
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DraftPage' }
    post:
      summary: 创建草稿
      operationId: createDraft
      tags: [Drafts]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateDraftRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DraftDetail' }

  /drafts/{draft_id}:
    parameters:
      - in: path
        name: draft_id
        required: true
        schema: { type: string, format: uuid }
    get:
      summary: 草稿详情（含 slides 列表）
      operationId: getDraft
      tags: [Drafts]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DraftDetail' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      summary: 更新草稿（标题 / 整体风格 / 自动保存；FR-035）
      operationId: updateDraft
      tags: [Drafts]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateDraftRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DraftDetail' }
        '409':
          description: 乐观锁失败（expected_revision 与服务端不一致）
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '423':
          description: 草稿被其他用户锁定
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
    delete:
      summary: 归档草稿（soft delete → status=archived）
      operationId: archiveDraft
      tags: [Drafts]
      responses:
        '204': { description: OK }

  /drafts/{draft_id}/lock:
    parameters:
      - in: path
        name: draft_id
        required: true
        schema: { type: string, format: uuid }
    post:
      summary: 获取草稿编辑锁（FR-035 单写者；30 分钟自动过期）
      operationId: acquireDraftLock
      tags: [Drafts]
      responses:
        '200':
          description: 取得锁
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DraftLockInfo' }
        '423':
          description: 锁被他人持有
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
    delete:
      summary: 主动释放草稿编辑锁
      operationId: releaseDraftLock
      tags: [Drafts]
      responses:
        '204': { description: OK }

  /drafts/{draft_id}/slides/{slide_id}:
    parameters:
      - in: path
        name: draft_id
        required: true
        schema: { type: string, format: uuid }
      - in: path
        name: slide_id
        required: true
        schema: { type: string, format: uuid }
    patch:
      summary: 调整草稿单张页（顺序 / 样式覆盖 / 文本）
      operationId: updateDraftSlide
      tags: [Drafts]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateDraftSlideRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DraftSlide' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      summary: 删除草稿中的某张页
      operationId: deleteDraftSlide
      tags: [Drafts]
      responses:
        '204': { description: OK }
        '404': { $ref: '#/components/responses/NotFound' }

  /drafts/{draft_id}/export:
    parameters:
      - in: path
        name: draft_id
        required: true
        schema: { type: string, format: uuid }
    post:
      summary: 导出草稿为 PPTX（FR-036 保留来源标注为 XMP / 自定义 XML）
      operationId: exportDraft
      tags: [Drafts]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DraftExportRequest' }
      responses:
        '202':
          description: 已入队打包
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DraftExportJob' }
        '423': { $ref: '#/components/responses/Locked' }

  /drafts/{draft_id}/export/{job_id}:
    parameters:
      - in: path
        name: draft_id
        required: true
        schema: { type: string, format: uuid }
      - in: path
        name: job_id
        required: true
        schema: { type: string, format: uuid }
    get:
      summary: 查询草稿导出任务进度
      operationId: getDraftExportJob
      tags: [Drafts]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DraftExportJob' }

  # ─── Preferences ───
  /preferences:
    get:
      summary: 获取当前用户的偏好规则（FR-013）
      operationId: listPreferences
      tags: [Preferences]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Preference' }
  /preferences/{preference_id}:
    parameters:
      - in: path
        name: preference_id
        required: true
        schema: { type: string, pattern: '^P-\d{3,}$' }
    get:
      summary: 偏好详情（含完整来源链）
      operationId: getPreference
      tags: [Preferences]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Preference' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      summary: 删除偏好（FR-013）
      operationId: deletePreference
      tags: [Preferences]
      responses:
        '204': { description: OK }
        '404': { $ref: '#/components/responses/NotFound' }

  # ─── Data Lifecycle ───
  /data/export:
    post:
      summary: 导出我的全部数据（FR-018）
      operationId: exportData
      tags: [DataLifecycle]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DataExportRequest' }
      responses:
        '202':
          description: 已入队打包
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ExportJob' }

  /data/export/{job_id}:
    parameters:
      - in: path
        name: job_id
        required: true
        schema: { type: string, format: uuid }
    get:
      summary: 查询导出任务进度
      operationId: getExportJob
      tags: [DataLifecycle]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ExportJob' }
        '404': { $ref: '#/components/responses/NotFound' }

  /data/delete-all:
    post:
      summary: 删除我的全部数据（FR-019）
      operationId: deleteAllData
      tags: [DataLifecycle]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DataDeleteRequest' }
      responses:
        '202':
          description: 已入队
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id: { type: string, format: uuid }
                  estimated_hard_delete_at: { type: string, format: date-time }
        '400':
          description: confirm_phrase 不匹配
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  # ─── Security ───
  /security/events:
    get:
      summary: 安全事件列表（FR-020）
      operationId: listSecurityEvents
      tags: [Security]
      parameters:
        - in: query
          name: event_type
          schema:
            type: string
            enum: [pii_hit, pii_blocked, pii_replaced, pii_acknowledged, unauth_access, bulk_export, bulk_delete]
        - in: query
          name: cursor
          schema: { type: string, description: '上一页响应中的 next_cursor（首次省略）' }
        - in: query
          name: page_size
          schema: { type: integer, default: 50, maximum: 200 }
        - in: query
          name: since
          schema: { type: string, format: date-time, description: '增量同步起点' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecurityEventCursorPage'

  # ─── API Keys ───
  /api_keys:
    get:
      summary: 列出当前用户的 API Key（仅前缀 + scopes，不含明文）
      operationId: listApiKeys
      tags: [ApiKeys]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ApiKey' }
    post:
      summary: 签发新的 API Key（明文 secret 仅在响应中返回一次）
      operationId: createApiKey
      tags: [ApiKeys]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateApiKeyRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiKeyWithSecret' }

  /api_keys/{key_id}:
    parameters:
      - in: path
        name: key_id
        required: true
        schema: { type: string, format: uuid }
    delete:
      summary: 撤销 API Key（FR-019 数据安全）
      operationId: revokeApiKey
      tags: [ApiKeys]
      responses:
        '204': { description: OK }
        '404': { $ref: '#/components/responses/NotFound' }

  # ─── WebSocket ───
  /ws:
    get:
      summary: WebSocket 端点 — 实时任务进度 / 队列 / 安全事件推送
      description: |
        握手时通过 `Authorization: Bearer <key>` 头鉴权（与 REST 一致）。
        握手后客户端 MUST 在 5 秒内发送 subscribe 消息，否则服务端主动断开。
        详细协议参见 `events.yaml` 与 `api-design.md §8`。
      operationId: wsConnect
      tags: [WebSocket]
      security:
        - ApiKeyAuth: []
      responses:
        '101': { description: Switching Protocols }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ─── Ops ───
  /healthz:
    get:
      summary: 健康检查（FR-023）
      operationId: healthz
      tags: [Ops]
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [ok, degraded] }
                  queue_length: { type: integer }
  /metrics:
    get:
      summary: Prometheus 指标（FR-023）
      operationId: metrics
      tags: [Ops]
      security: []
      responses:
        '200':
          description: text/plain
          content:
            text/plain:
              schema: { type: string }

    # ─── US6 Locked Response ───
    Locked:
      description: 资源被锁定（FR-035 单写者锁）
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
      description: 形如 `Bearer <key>`（最小权限 IV + 速率限制）

  parameters:
    RequestId:
      in: header
      name: X-Request-Id
      schema: { type: string, format: uuid }
      required: false
      description: 客户端生成的请求 ID；服务端透传到 trace，便于日志关联
    IdempotencyKey:
      in: header
      name: Idempotency-Key
      schema: { type: string, format: uuid }
      required: false
      description: 24h 内同 key 同 body 去重（POST 写入类端点推荐）

  headers:
    XRequestId:
      description: 与请求头一致或服务端生成
      schema: { type: string, format: uuid }
    XRateLimitLimit:
      description: 当前 key 的速率上限
      schema: { type: integer }
    XRateLimitRemaining:
      description: 当前窗口剩余次数
      schema: { type: integer }
    XRateLimitReset:
      description: 窗口重置 Unix 时间戳
      schema: { type: integer }
    RetryAfter:
      description: 退避秒数
      schema: { type: integer }
    IdempotencyReplay:
      description: 'true 表示本次响应来自幂等键去重'
      schema: { type: boolean }

  responses:
    BadRequest:
      description: 请求参数错误
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    Unauthorized:
      description: 未认证
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    NotFound:
      description: 资源不存在
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    Conflict:
      description: 状态冲突（如取消已完成任务）
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    PayloadTooLarge:
      description: 单文件 > 50MB 或批量 > 20 份
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    RateLimited:
      description: 并发超限 / 配额耗尽
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }

  schemas:
    CreateGenerationRequest:
      type: object
      required: [prompt]
      properties:
        prompt:
          type: string
          minLength: 1
          maxLength: 1000
          description: 一句话需求（FR-001）
        referenced_sample_ids:
          type: array
          items: { type: string, format: uuid }
          description: 可选，指定本次任务使用的样本子集

    GenerationTask:
      type: object
      properties:
        id: { type: string, format: uuid }
        prompt: { type: string }
        status:
          type: string
          enum: [queued, running, success, failed, cancelled, archived]
        current_stage:
          type: string
          enum: [outline, points, svg, pptx, null]
        queue_position:
          type: integer
          nullable: true
          description: FR-029 排队位置
        result_pptx_url:
          type: string
          format: uri
          nullable: true
        style_fit_score:
          $ref: '#/components/schemas/StyleFitScore'
        token_consumed: { type: integer }
        estimated_tokens: { type: integer, nullable: true }
        estimated_seconds: { type: integer, nullable: true }
        created_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time, nullable: true }

    TraceStage:
      type: object
      properties:
        id: { type: string, format: uuid }
        stage_name:
          type: string
          enum: [outline, points, svg, pptx]
        stage_order: { type: integer }
        input_summary: { type: string }
        output_summary: { type: string }
        referenced_sample_ids:
          type: array
          items: { type: string, format: uuid }
        duration_ms: { type: integer }
        status:
          type: string
          enum: [pending, running, success, failed]
        error_message: { type: string, nullable: true }
        redo_count: { type: integer }

    Sample:
      type: object
      properties:
        id: { type: string, format: uuid }
        file_name: { type: string }
        file_type:
          type: string
          enum: [pptx, pdf, docx]
        parse_status:
          type: string
          enum: [pending, parsing, parsed, failed]
        parse_page_count: { type: integer, nullable: true }
        pii_summary: { $ref: '#/components/schemas/PIISummary' }
        uploaded_at: { type: string, format: date-time }
        parsed_at: { type: string, format: date-time, nullable: true }
        error_message: { type: string, nullable: true }

    SampleDetail:
      type: object
      description: 单样本详情（含 PII 处置摘要 + 解析结果）
      properties:
        id: { type: string, format: uuid }
        file_name: { type: string }
        file_type: { type: string, enum: [pptx, pdf, docx] }
        file_size_bytes: { type: integer, description: '原始文件大小（FR-006 ≤ 50MB）' }
        file_hash: { type: string, description: 'SHA-256，FR-010 去重' }
        parse_status: { type: string, enum: [pending, parsing, parsed, failed] }
        parse_page_count: { type: integer, nullable: true }
        pii_summary: { $ref: '#/components/schemas/PIISummary' }
        parse_result:
          description: 解析结构化结果（仅 parse_status=parsed 时返回）
          allOf:
            - $ref: '#/components/schemas/ParseResult'
        uploaded_at: { type: string, format: date-time }
        parsed_at: { type: string, format: date-time, nullable: true }
        error_message: { type: string, nullable: true }

    ParseResult:
      type: object
      properties:
        version: { type: string, description: 解析器版本（依赖锁定） }
        structure:
          type: object
          description: '页/版式/文本块的层级 JSON（PG 结构化摘要）'
          additionalProperties: true
        parsed_at: { type: string, format: date-time }
        page_count: { type: integer }

    PIISummary:
      type: object
      properties:
        total_hits: { type: integer }
        hits_by_field:
          type: object
          additionalProperties: { type: integer }
          example: { phone: 2, email: 1, id_card: 0, customer_name: 3 }
        fields_replaced: { type: integer }

    Preference:
      type: object
      properties:
        id: { type: string, pattern: '^P-\\d{3,}$', example: P-007 }
        rule_text: { type: string }
        applies_to:
          type: string
          enum: [cover, toc, body, closing, all]
        apply_count: { type: integer }
        ignore_count: { type: integer }
        last_applied_at: { type: string, format: date-time, nullable: true }
        is_active: { type: boolean }
        source_chains:
          type: array
          items: { $ref: '#/components/schemas/SourceChain' }

    SourceChain:
      type: object
      properties:
        type: { type: string, enum: [sample, generation, manual] }
        ref_id: { type: string, format: uuid }
        snippet: { type: string, maxLength: 500 }
        created_at: { type: string, format: date-time }

    StyleFitScore:
      type: object
      properties:
        layout: { type: number, minimum: 0, maximum: 1 }
        palette: { type: number, minimum: 0, maximum: 1 }
        font: { type: number, minimum: 0, maximum: 1 }
        overall_hit: { type: boolean, description: FR-028 三层均 ≥ 80% 时为 true }

    ExportJob:
      type: object
      properties:
        id: { type: string, format: uuid }
        status:
          type: string
          enum: [pending, running, ready, failed]
        download_url: { type: string, format: uri, nullable: true }
        expires_at: { type: string, format: date-time, nullable: true }

    SecurityEventPage:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/SecurityEvent' }
        total: { type: integer }
        page: { type: integer }
        page_size: { type: integer }

    SecurityEvent:
      type: object
      properties:
        id: { type: string, format: uuid }
        event_type:
          type: string
          enum: [pii_hit, pii_blocked, pii_replaced, pii_acknowledged, unauth_access, bulk_export, bulk_delete]
        hit_field: { type: string, nullable: true }
        action_taken:
          type: string
          enum: [replace, block, allow]
        related_resource_id: { type: string, format: uuid, nullable: true }
        created_at: { type: string, format: date-time }
        details: { type: object, additionalProperties: true }

    Problem:
      type: object
      description: RFC 7807
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string, format: uri }
        code: { type: string, description: PPTagent 自定义错误码，详见 error-codes.yaml }
        request_id: { type: string, format: uuid, description: 关联 X-Request-Id }
        trace_id: { type: string, description: OTel trace ID }
        errors:
          type: array
          description: 字段级错误（422 验证失败时填充）
          items:
            type: object
            properties:
              field: { type: string }
              code: { type: string }
              message: { type: string }

    # ─── Pagination ───
    Page:
      type: object
      description: 传统分页（适用于中小列表）
      properties:
        items:
          type: array
          items: { type: object }
        total: { type: integer, description: 总条数 }
        page: { type: integer, minimum: 1 }
        page_size: { type: integer, minimum: 1, maximum: 100 }
        has_next: { type: boolean }
        next: { type: string, format: uri, nullable: true }
        prev: { type: string, format: uri, nullable: true }

    CursorPage:
      type: object
      description: 游标分页（适用于大表 / 实时流）
      properties:
        items:
          type: array
          items: { type: object }
        next_cursor: { type: string, nullable: true, description: '下一页游标；null 表示已到末尾' }
        has_next: { type: boolean }

    SecurityEventCursorPage:
      allOf:
        - $ref: '#/components/schemas/CursorPage'
        - type: object
          properties:
            items:
              type: array
              items: { $ref: '#/components/schemas/SecurityEvent' }

    # ─── Data Lifecycle DTO ───
    DataExportRequest:
      type: object
      required: [confirm_phrase, acknowledged_at]
      properties:
        include_raw:
          type: boolean
          default: true
          description: 包含原始文件
        include_parse:
          type: boolean
          default: true
          description: 包含解析结果
        include_preferences:
          type: boolean
          default: true
          description: 包含偏好规则
        include_traces:
          type: boolean
          default: false
          description: 包含生成轨迹
        confirm_phrase:
          type: string
          enum: [EXPORT ALL MY DATA]
          description: 二次确认；必须字面量匹配
        acknowledged_at:
          type: string
          format: date-time

    DataDeleteRequest:
      type: object
      required: [confirm_phrase, acknowledged_at]
      properties:
        confirm_phrase:
          type: string
          enum: [DELETE ALL MY DATA]
          description: 二次确认；必须字面量匹配
        acknowledged_at:
          type: string
          format: date-time

    # ─── API Key DTO ───
    ApiKey:
      type: object
      description: API Key 列表响应（不含 secret）
      properties:
        id: { type: string, format: uuid }
        key_prefix: { type: string, example: 'sk-abc1...' }
        scopes:
          type: array
          items: { type: string }
        rate_limit_per_min: { type: integer }
        last_used_at: { type: string, format: date-time, nullable: true }
        expires_at: { type: string, format: date-time, nullable: true }
        revoked_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    ApiKeyWithSecret:
      allOf:
        - $ref: '#/components/schemas/ApiKey'
        - type: object
          required: [secret]
          properties:
            secret:
              type: string
              description: |
                **仅创建时返回一次**。明文 API Key 形如 `sk-abc1xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx`。
                服务端仅保存 SHA-256 哈希，请立即保存到安全位置。

    CreateApiKeyRequest:
      type: object
      required: [name, scopes]
      properties:
        name:
          type: string
          maxLength: 64
          description: 便于识别的 key 名称（如 "CI/CD"）
        scopes:
          type: array
          items:
            type: string
            enum:
              - generation:write
              - generation:read
              - sample:write
              - sample:read
              - preference:read
              - preference:write
              - data:export
              - data:delete-all
              - security:read
              - api_key:write
              - api_key:read
        rate_limit_per_min:
          type: integer
          minimum: 1
          maximum: 1000
          default: 60
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: 可选到期时间；null = 永不过期

    # ─── US6 素材库 ───
    SlideVisualType:
      type: string
      enum: [cover, toc, architecture, flowchart, data, body, closing, mixed]
    DraftStatus:
      type: string
      enum: [active, archived, exported]
    DraftSlideSourceType:
      type: string
      enum: [reused, generated, manual]

    SlideAsset:
      type: object
      description: FR-030 抽取出的可复用素材（按页为最小单位）
      properties:
        id: { type: string, format: uuid }
        owner_id: { type: string, format: uuid }
        source_sample_id: { type: string, format: uuid, nullable: true }
        source_page_index: { type: integer, minimum: 1 }
        visual_type: { $ref: '#/components/schemas/SlideVisualType' }
        content_type: { type: string, enum: [svg, text, image, chart] }
        slide_title: { type: string, nullable: true }
        text_content: { type: string, nullable: true }
        thumbnail_url: { type: string, nullable: true }
        industry_tags:
          type: array
          items: { type: string }
        is_orphan: { type: boolean }
        is_archived: { type: boolean }
        reuse_count: { type: integer }
        last_reused_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    SlideAssetDetail:
      allOf:
        - $ref: '#/components/schemas/SlideAsset'
        - type: object
          properties:
            style_features: { type: object, additionalProperties: true, nullable: true }
            svg_payload: { type: object, additionalProperties: true, nullable: true }
            structure_payload: { type: object, additionalProperties: true, nullable: true }

    MaterialSearchResult:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/SlideAsset' }
        total: { type: integer }
        page: { type: integer }
        page_size: { type: integer }
        has_next: { type: boolean }
        next_url: { type: string, nullable: true }

    InsertMaterialRequest:
      type: object
      required: [draft_id, slide_order, enable_style_normalize]
      properties:
        draft_id: { type: string, format: uuid }
        slide_order: { type: integer, minimum: 1 }
        enable_style_normalize: { type: boolean, default: true, description: FR-034 风格归一开关 }
        expected_revision: { type: integer, minimum: 0, description: 草稿乐观锁 }

    # ─── US6 草稿 ───
    Draft:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        status: { $ref: '#/components/schemas/DraftStatus' }
        overall_style: { type: object, additionalProperties: true, nullable: true }
        editor_user_id: { type: string, format: uuid, nullable: true }
        last_saved_at: { type: string, format: date-time }
        slide_count: { type: integer }
        created_at: { type: string, format: date-time }
        revision: { type: integer, description: 乐观锁当前值 }

    DraftSlide:
      type: object
      properties:
        id: { type: string, format: uuid }
        slide_order: { type: integer, minimum: 1 }
        source_type: { $ref: '#/components/schemas/DraftSlideSourceType' }
        source_asset_id: { type: string, format: uuid, nullable: true }
        source_stage_id: { type: string, format: uuid, nullable: true }
        thumbnail_url: { type: string, nullable: true }
        style_normalized: { type: boolean }
        normalized_failed: { type: boolean }
        source_attribution: { type: string }

    DraftDetail:
      allOf:
        - $ref: '#/components/schemas/Draft'
        - type: object
          properties:
            slides:
              type: array
              items: { $ref: '#/components/schemas/DraftSlide' }

    DraftPage:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Draft' }
        total: { type: integer }
        page: { type: integer }
        page_size: { type: integer }
        has_next: { type: boolean }

    CreateDraftRequest:
      type: object
      properties:
        title: { type: string, maxLength: 256, default: 'Untitled Draft' }
        initial_style:
          type: object
          additionalProperties: true
          nullable: true
          description: 可选：手动指定整体风格（color_palette / font_family / layout_id）

    UpdateDraftRequest:
      type: object
      required: [expected_revision]
      properties:
        title: { type: string, maxLength: 256 }
        overall_style: { type: object, additionalProperties: true, nullable: true }
        slides_snapshot:
          type: array
          items: { $ref: '#/components/schemas/DraftSlide' }
          description: 客户端完整快照；服务端 diff 后写回
        expected_revision: { type: integer, minimum: 0 }

    UpdateDraftSlideRequest:
      type: object
      properties:
        slide_order: { type: integer, minimum: 1 }
        style_overrides: { type: object, additionalProperties: true, nullable: true }
        text_overrides: { type: object, additionalProperties: true, nullable: true }
        expected_revision: { type: integer, minimum: 0 }

    DraftLockInfo:
      type: object
      properties:
        editor_user_id: { type: string, format: uuid }
        acquired_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time, description: 30 分钟后自动过期 }

    DraftExportRequest:
      type: object
      required: [expected_revision]
      properties:
        include_source_attribution: { type: boolean, default: true, description: FR-036 写入 XMP / 自定义 XML }
        final_style_overrides: { type: object, additionalProperties: true, nullable: true }
        expected_revision: { type: integer, minimum: 0 }

    DraftExportJob:
      type: object
      properties:
        job_id: { type: string, format: uuid }
        status: { type: string, enum: [pending, running, ready, failed] }
        download_url: { type: string, nullable: true }
        expires_at: { type: string, format: date-time, nullable: true }
        error:
          type: object
          additionalProperties: true
          nullable: true
